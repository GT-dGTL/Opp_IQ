<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OppIQ — AI Opportunity Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <div class="logo-mark">
          <img src="./assets/logo.svg" alt="OppIQ logo" />
        </div>
        <div>
          <div class="logo-text__name">OppIQ</div>
          <div class="logo-text__tag">Opportunity Intelligence</div>
        </div>
      </div>

      <nav class="sidebar__nav">
        <div class="nav-section">
          <p class="nav-section__title">Pipeline</p>
          <a class="nav-item" data-view="pipeline" data-tab="all">
            <span class="nav-item__left">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/></svg></span>
              My Pipeline
            </span>
            <span class="nav-badge" id="badgeMyPipeline">0</span>
          </a>
          <a class="nav-item" data-view="pipeline" data-tab="diligence">
            <span class="nav-item__left">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
              In Diligence
            </span>
            <span class="nav-badge" id="badgeInDiligence">0</span>
          </a>
          <a class="nav-item" data-view="pipeline" data-tab="closed">
            <span class="nav-item__left">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
              Closed
            </span>
          </a>
        </div>

        <div class="nav-section">
          <p class="nav-section__title">Worklist</p>
          <a class="nav-item active" data-view="dashboard">
            <span class="nav-item__left">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span>
              Opportunity Insights
            </span>
          </a>
        </div>

        <div class="nav-section">
          <p class="nav-section__title">Learn</p>
          <a class="nav-item" data-view="how-it-thinks">
            <span class="nav-item__left">
              <span class="nav-item__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
              How OppIQ Thinks
            </span>
          </a>
        </div>
      </nav>

      <div class="sidebar__profile">
        <div class="avatar">AK</div>
        <div class="profile-info">
          <div class="profile-name">Arjun Kapoor</div>
          <div class="profile-role">Sr. BD Manager</div>
        </div>
        <div class="profile-icons">
          <button class="icon-btn" title="Settings" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="icon-btn" title="Help" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ================= MAIN ================= -->
    <div class="main">
      <header class="topbar">
        <div class="topbar__left">
          <button class="icon-btn" id="sidebarToggle" title="Toggle sidebar" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
          <span class="breadcrumb" id="topbarBreadcrumb">Opportunity Insights</span>
        </div>
        <div class="topbar__right">
          <span class="role-pill">BD Analyst</span>

          <div class="search-box" id="searchBox">
            <input type="text" class="search-box__input" id="searchInput" placeholder="Search opportunities..." autocomplete="off" />
            <button class="icon-btn" title="Search" type="button" data-action="toggle-search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="search-box__results hidden" id="searchResults"></div>
          </div>

          <div class="notif-box" id="notifBox">
            <button class="icon-btn" title="Notifications" type="button" data-action="toggle-notifications">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
              <span class="notification-dot" id="notificationDot"></span>
            </button>
            <div class="notif-dropdown hidden" id="notifDropdown"></div>
          </div>

          <div class="profile-box" id="profileBox">
            <button class="avatar avatar--sm" type="button" data-action="toggle-profile">AK</button>
            <div class="profile-dropdown hidden" id="profileDropdown">
              <div class="profile-dropdown__header">
                <div class="avatar">AK</div>
                <div>
                  <div class="profile-dropdown__name">Arjun Kapoor</div>
                  <div class="profile-dropdown__role">Sr. BD Manager · Continuum Energy</div>
                </div>
              </div>
              <div class="profile-dropdown__divider"></div>
              <button class="profile-dropdown__item" data-action="profile-item" data-label="Account Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Account Settings
              </button>
              <button class="profile-dropdown__item" data-action="profile-item" data-label="Help &amp; Support">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Help &amp; Support
              </button>
              <div class="profile-dropdown__divider"></div>
              <button class="profile-dropdown__item profile-dropdown__item--danger" data-action="sign-out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="content" id="content">
        <!-- Views are rendered here by script.js -->
      </main>
    </div>
  </div>

  <!-- ================= RUN INTELLIGENCE SCAN MODAL ================= -->
  <div class="overlay-backdrop center" id="scanBackdrop">
    <div class="modal" id="scanModal">
      <!-- Rendered by script.js -->
    </div>
  </div>

  <!-- ================= GENERATE BUSINESS PLAN MODAL ================= -->
  <div class="overlay-backdrop center" id="bpGenBackdrop">
    <div class="modal" id="bpGenModal">
      <!-- Rendered by script.js -->
    </div>
  </div>

  <!-- ================= FETCH OPPORTUNITIES MODAL ================= -->
  <div class="overlay-backdrop center" id="fetchBackdrop">
    <div class="modal" id="fetchModal">
      <!-- Rendered by script.js -->
    </div>
  </div>

  <!-- ================= ACCOUNT / HELP / SIGN-OUT MODAL ================= -->
  <div class="overlay-backdrop center" id="infoBackdrop">
    <div class="modal" id="infoModal">
      <!-- Rendered by script.js -->
    </div>
  </div>

  <!-- ================= TOASTS ================= -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="./data/opportunities.js"></script>
  <script src="./script.js"></script>
</body>
</html>
